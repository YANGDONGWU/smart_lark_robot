name: Feishu AI Bot 24h
on:
  schedule:
    - cron: '0 */5 * * *'  # 每 6 小时自动启动新实例
  workflow_dispatch:       # 允许手动启动

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 设置超市时间略低于 cron 频率，确保平滑切换
    timeout-minutes: 350 
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install lark-oapi openai tavily-python
      - name: Run AI Assistant
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
        run: python bot.py
