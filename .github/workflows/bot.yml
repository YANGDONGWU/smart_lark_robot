name: Feishu AI Bot Auto Deploy

on:
  push:
    branches:
      - main  # 当你 git push 到 main 分支时自动触发部署
  schedule:
    - cron: '0 */5 * * *' # 每 5 小时自动重跑一次（防止 GitHub Actions 超时停止）
  workflow_dispatch:      # 允许你在 GitHub 页面上手动点击按钮部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 如果上一个任务还在跑，直接杀掉它，保证只有一个机器人在线
    concurrency:
      group: feishu-bot
      cancel-in-progress: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 自动缓存依赖，加快部署速度

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install lark-oapi==1.5.3 openai tavily-python

      - name: Run Bot
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
        run: python bot.py